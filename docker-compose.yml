services:
  operations-db:
    image: postgres:16-alpine
    container_name: ordercheck-operations-db
    environment:
      POSTGRES_DB: operations_db
      POSTGRES_USER: operations_user
      POSTGRES_PASSWORD: operations_password
    ports:
      - "0.0.0.0:5434:5432"
    volumes:
      - operations_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operations_user -d operations_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ordercheck-network

  operations-service:
    build:
      context: ./operations-service
    container_name: ordercheck-operations-service
    environment:
      OPERATIONS_PORT: 3010
      OPERATIONS_DATABASE_URL: postgresql://operations_user:operations_password@operations-db:5432/operations_db
      OPERATIONS_SHARED_AUTH_SECRET: change_this_session_secret_in_production
      MAIN_APP_URL: https://spice-investigated-allowed-dom.trycloudflare.com
      NODE_ENV: production
    ports:
      - "3010:3010"
    depends_on:
      operations-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - ordercheck-network

  mongodb:
    image: mongo:7.0
    container_name: ordercheck-mongodb-v2
    ports:
      - "0.0.0.0:27017:27017"  # Bind trên tất cả interfaces để cho phép remote access
    volumes:
      - mongodb_data:/data/db
      - ./init-data.js:/docker-entrypoint-initdb.d/init-data.js:ro
    restart: unless-stopped
    networks:
      - ordercheck-network
    command: mongod --bind_ip_all  # Cho phép kết nối từ tất cả IP, không có authentication

  ordercheck:
    build: .
    container_name: ordercheck-app-v2
    ports:
      - "3001:3001"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/OrderDetailing
      SESSION_SECRET: change_this_session_secret_in_production
      OPERATIONS_APP_URL: https://roots-harvey-transform-meant.trycloudflare.com
      PORT: 3001
      NODE_ENV: production
      # ERPNext Configuration
      # Nếu ERPNext chạy trên máy host (không trong Docker), dùng host.docker.internal
      # Nếu ERPNext chạy trong Docker khác, dùng tên service hoặc IP container
      ERPNEXT_URL: ${ERPNEXT_URL:-http://host.docker.internal:8080}
      ERPNEXT_API_KEY: ${ERPNEXT_API_KEY:-7da6579c83ee8ff}
      ERPNEXT_API_SECRET: ${ERPNEXT_API_SECRET:-406e4001191ddc0}

       # SAPO Configuration (thêm đoạn này)
      SAPO_URL: https://tinhtra.mysapo.net
      SAPO_API_KEY: 002d591935e245e5ba9993e20b9c60e3
      SAPO_API_SECRET: b10296a85d6f4ca99ad8b699192937db
      SAPO_PURCHASE_ORDER_ENDPOINT: /admin/purchase_orders.json
      SAPO_LOCATION_ID: "889532"
      SAPO_SUPPLIER_ID: "121591"
      SAPO_ASSIGNEE_ID: "809229"
      SAPO_RECEIPT_STATUS: active
      # Video recording configuration
      VIDEO_COM_CHANNEL_MAP: ${VIDEO_COM_CHANNEL_MAP:-{"COM14":1,"COM8":2}}
      CAM_RTSP_CHANNEL_1: ${CAM_RTSP_CHANNEL_1:-}
      CAM_RTSP_CHANNEL_2: ${CAM_RTSP_CHANNEL_2:-}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    restart: unless-stopped
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ordercheck-network

volumes:
  mongodb_data:
  operations_postgres_data:

networks:
  ordercheck-network:
    driver: bridge
